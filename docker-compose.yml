services:

  db:
    image: postgres:16-alpine
    container_name: carpooling-db
    environment:
      POSTGRES_DB: carpooling
      POSTGRES_USER: carpooling
      POSTGRES_PASSWORD: carpooling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carpooling"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: carpooling-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/carpooling
      DB_USER: carpooling
      DB_PASSWORD: carpooling
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

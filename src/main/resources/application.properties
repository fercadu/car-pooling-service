server.port=8080
spring.application.name=car-pooling-service

# ── Database (PostgreSQL — configurable via env vars for Docker/Cloud) ──
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:carpooling}}
spring.datasource.username=${DB_USER:carpooling}
spring.datasource.password=${DB_PASSWORD:carpooling}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (tuned for free-tier 512MB RAM) ──
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ── JPA / Hibernate ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true

# ── Logging ──────────────────────────────────────────
# App classes: INFO by default (shows load/journey/dropoff/reassign)
logging.level.com.carpooling=INFO
# Switch to DEBUG to see fleet detail, individual seat occupancy, locate calls
# logging.level.com.carpooling=DEBUG

# Show request method + URI for every HTTP request
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Colored, readable console pattern with thread name
logging.pattern.console=%d{HH:mm:ss.SSS} %highlight(%-5level) [%15.15thread] %cyan(%-40.40logger{39}) : %msg%n
